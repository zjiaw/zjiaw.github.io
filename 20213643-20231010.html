         <h1>我的视频播放</h1>
   <div style="text-align:center">
         <p><button onclick="previous()">上一个</button></p>
	 <button onclick="playPause()">播放/暂停</button>
         <p><button onclick="next()">下一个</button></p>
		 <video id="myVideo" width="500">
            <source src="rem.mp4" type="video/mp4">
        </video>
    </div>
<script type="text/javascript">
     var myVideo = document.getElementById("myVideo");
     function previous() {
      if (myVideo > 0) {
        myVideo--;
        videoElement.src = videos[myVideo];
      }
    }
    function playPause() {
        if(myVideo.paused)
            myVideo.play();
        else
            myVideo.pause();
    } 
    function next() {
      if (myVideo < videos.length - 1) {
        myVideo++;
        videoElement.src = videos[myVideo];
      }
    }
</script>
</body>

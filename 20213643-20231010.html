         <h1>视频播放</h1>
   <div style="text-align:center">
         <video id="myVideo" width="500"
		 controls src="rem.mp4" 
	         controls src="02.mp4"
	         controls src="selena.mp4"
		 controls src="saber.mp4"
		 type="video/mp4/">
		 </video>
		 <p><button onclick="last()">上一个</button></p>
		 <button onclick="playPause()">播放/暂停</button>
         <p><button onclick="next()">下一个</button></p>
    </div>
<script type="text/javascript">
    var myVideo = document.getElementById("myVideo");
    function playPause() {
        if(myVideo.paused)
            myVideo.play();
        else
            myVideo.pause();
    }
</script>
